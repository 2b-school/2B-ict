<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تسجيل الدخول - أكاديمية المغامرة</title>
    <link rel="stylesheet" href="css/style.css">
</head>
    <style>
        /* أشكال عائمة في الخلفية لكسر الجمود وإعطاء طابع الألعاب */
        .floating-shapes { position: absolute; top: 0; left: 0; width: 100%; height: 100%; overflow: hidden; z-index: 0; pointer-events: none; }
        .shape { position: absolute; background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(5px); animation: float 15s infinite linear; }
        .shape-1 { width: 100px; height: 100px; border-radius: 50%; top: 10%; left: 10%; }
        .shape-2 { width: 150px; height: 150px; transform: rotate(45deg); top: 60%; right: 10%; background: rgba(255, 255, 255, 0.05); }
        .shape-3 { width: 80px; height: 80px; border-radius: 20px; top: 80%; left: 20%; animation-duration: 10s; }
        
        @keyframes float {
            0% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-100px) rotate(180deg); }
            100% { transform: translateY(0) rotate(360deg); }
        }

        /* تنسيق الأقسام التعريفية الجديدة داخل البطاقة */
        .info-card { position: relative; z-index: 1; padding-bottom: 30px; }
        .info-section { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; padding: 25px; margin-top: 25px; text-align: right; }
        .info-section h3 { color: #ffcc00; margin-bottom: 15px; font-size: 1.4rem; display: flex; align-items: center; gap: 10px; }
        .info-section p { color: #ecf0f1; font-size: 1.1rem; line-height: 1.8; margin-bottom: 0; }
        
        /* قائمة الخطوات */
        .steps-list { list-style: none; padding: 0; margin-top: 15px; }
        .steps-list li { margin-bottom: 15px; color: white; display: flex; align-items: center; gap: 12px; font-size: 1.1rem; }
        .step-number { background: var(--accent-color); color: white; width: 35px; height: 35px; display: flex; justify-content: center; align-items: center; border-radius: 50%; font-weight: bold; flex-shrink: 0; }
        
        /* تنسيق زر الانطلاق */
        .action-area { margin-top: 35px; text-align: center; }
        .action-area a { text-decoration: none; display: inline-block; width: 100%; }
    </style>
<body>
    <div class="login-container">
        <div class="login-card">
            <h2>تسجيل دخول المعلم 👨‍🏫</h2>
            <p>أدخل بياناتك المسجلة في النظام</p>
            
            <div class="form-group">
                <input type="text" id="username" placeholder="اسم المستخدم">
                <input type="password" id="password" placeholder="كلمة المرور">
                <button id="loginBtn" class="launch-button" onclick="handleLogin()">دخول</button>
            </div>
            
            <p id="error-message" style="color: red; margin-top: 10px;"></p>
            <a href="index.html" class="back-link">العودة للرئيسية</a>
        </div>
    </div>
    <a href="https://wa.me/201015987266" class="whatsapp-float" target="_blank">
        <i class="fab fa-whatsapp"></i>
        <span>تواصل معنا</span>
    </a>

    <footer class="main-footer">
        <p>تم التصميم بواسطة: <strong>أحمد سمير، جابر محمود</strong> © 2026</p>
    </footer>
    <script src="js/db.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
